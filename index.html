<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, inital-scale=1.0" />
        <title>Snack Sense</title>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
        <link rel="icon" type="image/x-icon" href="main-icon.ico">
        <link rel="stylesheet" href="styles.css" />
    </head>

    <body>
        <header>
            <h1>Welcome to <strong>Snack Sense</strong></h1>
            <p>Your snack destiny awaits you...</p>
        </header>

        <!-- cookie area :D -->

        <main>
            <div id="cookie-cintainer">
                <img id="cookie-whole" src="main-fortune-cookie.png" alt="THE fortune cookie :D"/>
                <!-- the different sides of the cookies for when it breaks-->

                <img id="cookie-left" src="main-fortune-cookie.png" alt="left cookie half" />
                <img id="cookie-right" src="main-fortune-cookie.png" alt="right cookie half" />

                <!-- the fortune -->

                <div id="fortune-strip">
                    <p id ="fortune-strip-text">click the <strong>fortune cookie</strong> to get a prediction!</p>
                </div>
            </div>

            <!-- the rating buttons for learning (ml) -->
            <div id="rating-buttons">
                <button id="love-button">Love!!</button>
                <button id="meh-button">Meh...</button>
                <button id="hate-button">Hate!</button>
            </div>
        </main>

        <footer>
            <!-- extra control buttons-->
            <button id="reset-btn">Reset (and DELETE) <strong>ALL DATA!</strong></button>
            <button id="stats-btn">View Your Stats</button>
            <button id="custom-snacks-btn">Add YOUR custom snacks!!</button>
            <p>Made with ❤️, ☕, and questionable snack choices by <a href="https://github.com/SmartSparkCoding" target="_blank" id="footer-link">Jacob</a></p>
        </footer>
</html>
