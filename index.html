<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snack Sense</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cause:wght@100..900&display=swap" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="main-icon.ico">
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <div id="theme-toggle-wrap" aria-label="Theme toggle">
      <span class="theme-label">Light</span>
      <label class="theme-switch" for="theme-toggle">
        <input id="theme-toggle" type="checkbox" aria-label="Toggle dark mode" />
        <span class="theme-slider"></span>
      </label>
      <span class="theme-label">Dark</span>
    </div>

    <header>
      <h1>Welcome to <strong>Snack Sense</strong>!</h1>
      <p>Your snack destiny awaits...</p>
    </header>

    <main>
      <div id="cookie-container">
        <img
          id="cookie-whole"
          src="main-fortune-cookie.png"
          alt="fortune cookie"
        />

        <img
          id="cookie-left"
          src="main-fortune-cookie.png"
          alt="left cookie half"
        />
        <img
          id="cookie-right"
          src="main-fortune-cookie.png"
          alt="right cookie half"
        />

        <div id="fortune-strip">
          <p id="fortune-strip-text">
            click the <strong>fortune cookie</strong> to get a prediction!
          </p>
        </div>
      </div>

      <div id="rating-buttons">
        <button id="love-button">Love</button>
        <button id="meh-button">Meh...</button>
        <button id="hate-button">HATE!</button>
      </div>
    </main>

    <footer>
      <div class="footer-buttons">
        <button id="stats-btn" class="footer-btn primary-btn">📊 Your Stats</button>
        <button id="more-options-btn" class="footer-btn">⋯ More</button>
      </div>
      <p>Made with 🍪 and ☕ by <a href="http://jacob.navaratne.studio/" target="_blank" rel="noreferrer noopener" id="footer-link">Jacob</a></p>
    </footer>

    <div id="stats-modal"></div>

    <div id="custom-snack-modal"></div>

    <div id="achievements-modal"></div>

    <div id="export-options-modal"></div>

    <div id="reset-confirm-modal"></div>

    <div id="more-options-modal"></div>

    <div id="tutorial-overlay"></div>
    <div id="tutorial-pointer"></div>

    <div id="achievement-toast-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
